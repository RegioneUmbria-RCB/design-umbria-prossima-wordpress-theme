    shortDescription: office, document-management, workflow-management, data-visualization
    longDescription: "Il template è stato realizzato da Regione Umbria, in collaborazione con la società in house PuntoZero Scarl, puntando ad una piena implementazione delle linee guida AgID e del design system .Italia (impiegato anche nella misura PNRR 1.4.1) quale base per il consolidamento progressivo o dei siti istituzionali e tematici della Regione e delle articolazioni regionali ("gruppo amministrazione pubblica" - GAP - e altri soggetti pubblici regionali) nella logica integrata e coordinata dell’accesso unico regionale (LR n.8/2011). Obiettivo principale del template è quello di rendere semplice l'accesso ai contenuti, garantendo la coerenza delle informazioni di una "aggregazione di soggetti pubblici" che si coordinano secondo precisi "content type" ovvero con un approccio "data-first" che permetta la progressiva automazione dei processi di pubblicazione a partire da dataset open data e/o da altre banche dati interne.Il template è un tema WordPress riutilizzabile da chiunque, progettato per essere facilmente adottato da enti pubblici, aderisce al "design system .Italia" e riusa parti del "modello di sito istituzionale" progettati nell'ambito dell'iniziativa Designers Italia dal Dipartimento per la trasformazione digitale nel rispetto delle LG sul design web e sull'accessibilità definite da AgID.e."
